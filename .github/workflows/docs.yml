name: Documentation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-deploy-docs:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code source
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Installation des dépendances (pas besoin de Qt6 grâce à BUILD_DOC_ONLY)
      - name: Installer Doxygen + Graphviz
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y doxygen graphviz

      # 3. Configuration CMake en mode doc uniquement
      - name: Configurer CMake
        run: cmake -B build -DBUILD_DOC_ONLY=ON

      # 4. Génération de la documentation
      - name: Générer la documentation Doxygen
        run: cmake --build build --target doc

      # 5. Déploiement sur GitHub Pages (seulement sur push, pas sur PR)
      - name: Déployer sur GitHub Pages
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/html
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "docs: mise à jour automatique [${{ github.sha }}]"